<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="func.css">
</head>
<body>
    <h1> Javascript experiments: Functions </h1>
<section id="add7">
    <h2>Add seven:</h2>
    <p>Choose a number, clicking submit will add seven unto it.</p>
 <input type="number" id="numVal" value="0">
 <button id="submitButt" onclick="add7()">Submit</button>
 <p id="numPara"></p>
 </section>
 <hr>
 <section>
    <h2>Capitalisation</h2>

    <input type="text" id="textVal" value="Type here...">
    <button id="textButton" onclick="capitalize()">Submit</button>
    <p id="textR"></p>
 </section>
 <hr>

 <section>
    <h2>Last letter of your word</h2>

    <input type="text" id="lastLetInput">
    <button id="lastButton" onclick="lastletter()">Submit</button>
    <p id="lastR"></p>
 </section>
    
    <script src="functions.js"></script>
</body>
</html>
